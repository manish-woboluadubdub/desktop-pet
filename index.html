<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Desktop Pet</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="pet" class="pet idle" data-facing="right">
    <div class="shadow"></div>
    <div class="body">
      <div class="ear ear-left"></div>
      <div class="ear ear-right"></div>
      <div class="face">
        <div class="eye eye-left"></div>
        <div class="eye eye-right"></div>
        <div class="nose"></div>
        <div class="whiskers whiskers-left"></div>
        <div class="whiskers whiskers-right"></div>
      </div>
      <div class="tail"></div>
      <div class="legs">
        <div class="leg leg-front-left"></div>
        <div class="leg leg-front-right"></div>
        <div class="leg leg-back-left"></div>
        <div class="leg leg-back-right"></div>
      </div>
    </div>
    <div class="bubble hidden">💤</div>
  </div>
  <script src="pet.js"></script>
</body>
</html>
